services:
  - type: web
    name: mp-build-tracker-service
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: WEBHOOK_SECRET
        sync: false
      - key: LOG_LEVEL
        value: INFO
